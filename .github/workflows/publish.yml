name: Publish to PyPI

on:
  release:
    types: [published]

jobs:
  publish:
    name: Build & publish to PyPI
    runs-on: ubuntu-latest
    permissions:
      id-token: write # Required for PyPI trusted publishing (OIDC)

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate release tag matches package version
        run: |
          python - <<'PY'
          import os
          import re
          import tomllib
          from pathlib import Path

          pyproject = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))
          version = pyproject["project"]["version"]
          package_init = Path("src/migi/__init__.py").read_text(encoding="utf-8")
          match = re.search(r'^__version__\s*=\s*"([^"]+)"', package_init, re.MULTILINE)
          if not match:
              raise SystemExit("Could not find __version__ in src/migi/__init__.py")

          package_version = match.group(1)
          tag = os.environ["GITHUB_REF_NAME"]
          normalized_tag = tag[1:] if tag.startswith("v") else tag

          if package_version != version:
              raise SystemExit(
                  f"Package version mismatch: src/migi/__init__.py is '{package_version}', "
                  f"but pyproject.toml project.version is '{version}'"
              )

          if normalized_tag != version:
              raise SystemExit(
                  f"Release tag '{tag}' does not match project.version '{version}' in pyproject.toml"
              )

          print(
              "Version check passed: "
              f"tag='{tag}', project.version='{version}', package.__version__='{package_version}'"
          )
          PY

      - name: Install build tools
        run: pip install build

      - name: Build package
        run: python -m build

      - name: Verify built package contents
        run: |
          python - <<'PY'
          import tarfile
          import zipfile
          from pathlib import Path

          dist = Path("dist")
          wheel = next(dist.glob("*.whl"))
          sdist = next(dist.glob("*.tar.gz"))
          required_wheel = {
              "migi/__init__.py",
              "migi/cli.py",
              "migi/assets/migi-desktop/SKILL.md",
          }
          required_sdist = {
              "src/migi/__init__.py",
              "src/migi/cli.py",
              "src/migi/assets/migi-desktop/SKILL.md",
          }

          with zipfile.ZipFile(wheel) as zf:
              wheel_names = set(zf.namelist())
          missing_wheel = sorted(required_wheel - wheel_names)
          if missing_wheel:
              raise SystemExit(f"Wheel is missing files: {missing_wheel}")

          with tarfile.open(sdist) as tf:
              sdist_names = {
                  name.split("/", 1)[1]
                  for name in tf.getnames()
                  if "/" in name
              }
          missing_sdist = sorted(required_sdist - sdist_names)
          if missing_sdist:
              raise SystemExit(f"sdist is missing files: {missing_sdist}")

          print(f"Package contents verified for {wheel.name} and {sdist.name}")
          PY

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
